syntax = "proto3";

package web.v1;

service AccountWebService {
  rpc CreateAccount(CreateAccountRequest) returns (CreateAccountResponse);
  rpc VerifyCredentials(VerifyCredentialsRequest) returns (VerifyCredentialsResponse);
}

enum CreateResult {
  CREATE_RESULT_UNSPECIFIED = 0;
  CREATE_RESULT_OK = 1;
  CREATE_RESULT_NAME_TAKEN = 2;
  CREATE_RESULT_INVALID = 3;
}

message CreateAccountRequest {
  string name = 1;
  string password = 2;
  string email = 3;
}

message CreateAccountResponse {
  CreateResult result = 1;
  int64 account_id = 2;
}

message VerifyCredentialsRequest {
  string name = 1;
  string password = 2;
}

message VerifyCredentialsResponse {
  bool ok = 1;
  int64 account_id = 2;
  bool blocked = 3;
  // Account role: "player", "moderator" or "admin". Used by the BFF to gate the
  // moderation UI. The web-api remains the authority on authorization.
  string role = 4;
}

service RankingWebService {
  rpc ListExpRanking(ListExpRankingRequest) returns (ListExpRankingResponse);
}

message ListExpRankingRequest {
  int32 limit = 1;  // default 50, max 100
  int32 offset = 2; // negative values are treated as 0
}

message RankingEntry {
  int32 rank = 1; // 1-based rank in the full ordered list
  string name = 2;
  int32 class = 3;
  int32 clan = 4;
  uint32 guild_id = 5;
  int32 level = 6;
  int64 exp = 7;
  int32 class_master = 8;
}

message ListExpRankingResponse {
  repeated RankingEntry entries = 1;
  int32 total_count = 2;
}

// CharacterWebService exposes read-only character summaries for the logged-in
// account. Live state remains owned by tmServer; this API reads persisted data.
service CharacterWebService {
  rpc ListMyCharacters(ListMyCharactersRequest) returns (ListMyCharactersResponse);
}

message ListMyCharactersRequest {
  int64 account_id = 1;
}

message CharacterSummary {
  int32 slot = 1;
  string name = 2;
  int32 class = 3;
  int32 level = 4;
  int64 exp = 5;
  int32 coin = 6;
  int32 max_hp = 7;
  int32 hp = 8;
  int32 max_mp = 9;
  int32 mp = 10;
  int32 strength = 11;
  int32 intelligence = 12;
  int32 dexterity = 13;
  int32 constitution = 14;
}

message ListMyCharactersResponse {
  repeated CharacterSummary characters = 1;
}

// NpcAdminService lets moderators edit the cold NPC config (visibility,
// position and shop/price). The web-api is the authority on authorization and
// validation. Business outcomes travel in the body via AdminResult; only
// infrastructure failures become gRPC errors.
service NpcAdminService {
  rpc ListNpcs(ListNpcsRequest) returns (ListNpcsResponse);
  rpc GetNpc(GetNpcRequest) returns (GetNpcResponse);
  rpc UpsertNpc(UpsertNpcRequest) returns (UpsertNpcResponse);
  rpc SetNpcVisibility(SetNpcVisibilityRequest) returns (AdminAck);
  rpc SetNpcShop(SetNpcShopRequest) returns (AdminAck);
  rpc SetItemPrice(SetItemPriceRequest) returns (AdminAck);
  rpc DeleteNpc(DeleteNpcRequest) returns (AdminAck);

  // Read-only lookups that back the moderation form's pickers, so moderators
  // choose from valid values instead of typing raw ids. Each is scanned once at
  // web-api boot (no per-request disk read). An empty list is a valid response
  // (web-api started without -content) — the UI falls back to a manual field.
  rpc ListMerchantTemplates(ListMerchantTemplatesRequest) returns (ListMerchantTemplatesResponse);
  rpc ListItemCatalog(ListItemCatalogRequest) returns (ListItemCatalogResponse);
  rpc ListMapZones(ListMapZonesRequest) returns (ListMapZonesResponse);
}

enum AdminResult {
  ADMIN_RESULT_UNSPECIFIED = 0;
  ADMIN_RESULT_OK = 1;
  ADMIN_RESULT_FORBIDDEN = 2;
  ADMIN_RESULT_INVALID = 3;
  ADMIN_RESULT_NOT_FOUND = 4;
}

message AdminNpc {
  int64  id            = 1;  // numeric id of the definition (use in npc_id)
  string slug          = 2;  // stable human key (e.g. "Karkarian-42")
  string template_name = 3;  // template file under Release/TMsrv/run/npc/
  string display_name  = 4;
  bool   enabled       = 5;  // "shows up or not"
  int32  map_id        = 6;  // loaded, but the game positions only by x/y
  int32  pos_x         = 7;  // spawn point
  int32  pos_y         = 8;
  int32  route_type    = 9;  // 0 = idle
  int32  merchant      = 10; // 0 non-merchant, 1 shop, 2 storage, 19 shop3, 100 quest
  repeated AdminNpcShopItem shop = 11; // filled in GetNpc/ListNpcs
}

message AdminNpcShopItem {
  int32 slot       = 1;  // shop display slot 0..26 (3 tabs of 9)
  int32 item_index = 2;  // index in ItemList (> 0)
  int32 eff1 = 3; int32 effv1 = 4;  // optional effects (0 = none)
  int32 eff2 = 5; int32 effv2 = 6;
  int32 eff3 = 7; int32 effv3 = 8;
  int32 quantity = 9;  // quantity sold in the slot; 0/absent becomes 1
}

message ListNpcsRequest {
  int64 moderator_id = 1;
}

message ListNpcsResponse {
  AdminResult result = 1;
  repeated AdminNpc npcs = 2;
}

message GetNpcRequest {
  int64 moderator_id = 1;
  int64 npc_id = 2;
}

message GetNpcResponse {
  AdminResult result = 1;
  AdminNpc npc = 2;
}

message UpsertNpcRequest {
  int64  moderator_id = 1;
  string slug         = 2;
  string template_name = 3;
  string display_name = 4;
  bool   enabled      = 5;
  int32  map_id       = 6;
  int32  pos_x        = 7;
  int32  pos_y        = 8;
  int32  route_type   = 9;
  int32  merchant     = 10;
}

message UpsertNpcResponse {
  AdminResult result = 1;
  int64 npc_id = 2;
}

message SetNpcVisibilityRequest {
  int64 moderator_id = 1;
  int64 npc_id = 2;
  bool  enabled = 3;
}

message SetNpcShopRequest {
  int64 moderator_id = 1;
  int64 npc_id = 2;
  repeated AdminNpcShopItem items = 3;
}

message SetItemPriceRequest {
  int64 moderator_id = 1;
  int32 item_index = 2;
  int64 price = 3;  // >= 0 sets the global price; < 0 clears the override
}

message DeleteNpcRequest {
  int64 moderator_id = 1;
  int64 npc_id = 2;
}

message AdminAck {
  AdminResult result = 1;
}

// A merchant template found under Release/TMsrv/run/npc/ (merchant != 0).
// Backs the template_name combobox. An empty templates list is valid.
message MerchantTemplate {
  string template_name = 1;  // exact value for UpsertNpc.template_name (no .txt)
  string display_name  = 2;  // template mob.Name, for display
  int32  merchant      = 3;  // see merchant semantics (1, 2, 19, 100…)
}
message ListMerchantTemplatesRequest { int64 moderator_id = 1; }
message ListMerchantTemplatesResponse {
  AdminResult result = 1;
  repeated MerchantTemplate templates = 2;
}

// One row of Release/Common/ItemList.csv, only what the item_index picker needs.
message ItemCatalogEntry {
  int32 item_index = 1;
  string name = 2;
}
message ListItemCatalogRequest { int64 moderator_id = 1; }
message ListItemCatalogResponse {
  AdminResult result = 1;
  repeated ItemCatalogEntry items = 2;
}

// One of the 5 fixed city zones. Label-only: map_id has no game effect today
// (single-grid world). Never empty.
message MapZone {
  int32 id = 1;
  string name = 2;
}
message ListMapZonesRequest { int64 moderator_id = 1; }
message ListMapZonesResponse {
  AdminResult result = 1;
  repeated MapZone zones = 2;
}

// Donate shop services. The browser never calls these directly; the Next.js
// BFF derives account_id/moderator_id from the httpOnly session cookie.
service DonateAdminService {
  rpc ListShopItems(ListShopItemsRequest) returns (ListShopItemsResponse);
  rpc UpsertShopItem(UpsertShopItemRequest) returns (UpsertShopItemResponse);
  rpc SetShopItemEnabled(SetShopItemEnabledRequest) returns (AdminAck);
  rpc DeleteShopItem(DeleteShopItemRequest) returns (AdminAck);
  rpc CreditDonateBalance(CreditDonateBalanceRequest) returns (CreditDonateBalanceResponse);
}

service DonateShopService {
  rpc ListShopItems(ListPublicShopItemsRequest) returns (ListPublicShopItemsResponse);
  rpc GetBalance(GetDonateBalanceRequest) returns (GetDonateBalanceResponse);
  rpc Buy(BuyDonateShopItemRequest) returns (BuyDonateShopItemResponse);
}

enum BuyResult {
  BUY_RESULT_UNSPECIFIED = 0;
  BUY_RESULT_OK = 1;
  BUY_RESULT_INSUFFICIENT_FUNDS = 2;
  BUY_RESULT_NOT_FOUND = 3;
  BUY_RESULT_DISABLED = 4;
}

message DonateShopItem {
  int64 id = 1;
  int32 item_index = 2;
  int32 eff1 = 3; int32 effv1 = 4;
  int32 eff2 = 5; int32 effv2 = 6;
  int32 eff3 = 7; int32 effv3 = 8;
  int32 price = 9;
  string title = 10;
  string description = 11;
  bool enabled = 12;
  int32 expires_days = 13;
}

message ListShopItemsRequest {
  int64 moderator_id = 1;
}

message ListShopItemsResponse {
  AdminResult result = 1;
  repeated DonateShopItem items = 2;
}

message UpsertShopItemRequest {
  int64 moderator_id = 1;
  DonateShopItem item = 2;
}

message UpsertShopItemResponse {
  AdminResult result = 1;
  int64 item_id = 2;
}

message SetShopItemEnabledRequest {
  int64 moderator_id = 1;
  int64 item_id = 2;
  bool enabled = 3;
}

message DeleteShopItemRequest {
  int64 moderator_id = 1;
  int64 item_id = 2;
}

message CreditDonateBalanceRequest {
  int64 moderator_id = 1;
  int64 account_id = 2;
  int32 amount = 3;
  string reason = 4;
}

message CreditDonateBalanceResponse {
  AdminResult result = 1;
  int64 new_balance = 2;
}

message ListPublicShopItemsRequest {}

message ListPublicShopItemsResponse {
  repeated DonateShopItem items = 1;
}

message GetDonateBalanceRequest {
  int64 account_id = 1;
}

message GetDonateBalanceResponse {
  int64 balance = 1;
}

message BuyDonateShopItemRequest {
  int64 account_id = 1;
  int64 shop_item_id = 2;
}

message BuyDonateShopItemResponse {
  BuyResult result = 1;
  int64 new_balance = 2;
}

// Daily reward services. The browser never calls these directly; the Next.js
// BFF derives account_id/moderator_id from the httpOnly session cookie. Free,
// resgatable at most once per account per UTC day; no wallet, no streak.
service DailyRewardAdminService {
  rpc ListRewardItems(ListRewardItemsRequest) returns (ListRewardItemsResponse);
  rpc UpsertRewardItem(UpsertRewardItemRequest) returns (UpsertRewardItemResponse);
  rpc SetRewardItemEnabled(SetRewardItemEnabledRequest) returns (AdminAck);
  rpc DeleteRewardItem(DeleteRewardItemRequest) returns (AdminAck);
}

service DailyRewardService {
  rpc ListRewards(ListRewardsRequest) returns (ListRewardsResponse);
  rpc GetClaimStatus(GetClaimStatusRequest) returns (GetClaimStatusResponse);
  rpc Claim(ClaimRewardRequest) returns (ClaimRewardResponse);
}

enum ClaimResult {
  CLAIM_RESULT_UNSPECIFIED = 0;
  CLAIM_RESULT_OK = 1;
  CLAIM_RESULT_ALREADY_CLAIMED = 2;
  CLAIM_RESULT_NOT_FOUND = 3;
  CLAIM_RESULT_DISABLED = 4;
}

message DailyRewardItem {
  int64 id = 1;
  int32 item_index = 2;
  int32 eff1 = 3; int32 effv1 = 4;
  int32 eff2 = 5; int32 effv2 = 6;
  int32 eff3 = 7; int32 effv3 = 8;
  string title = 9;
  string description = 10;
  bool enabled = 11;
  int32 expires_days = 12;
}

message ListRewardItemsRequest {
  int64 moderator_id = 1;
}

message ListRewardItemsResponse {
  AdminResult result = 1;
  repeated DailyRewardItem items = 2;
}

message UpsertRewardItemRequest {
  int64 moderator_id = 1;
  DailyRewardItem item = 2;
}

message UpsertRewardItemResponse {
  AdminResult result = 1;
  int64 item_id = 2;
}

message SetRewardItemEnabledRequest {
  int64 moderator_id = 1;
  int64 item_id = 2;
  bool enabled = 3;
}

message DeleteRewardItemRequest {
  int64 moderator_id = 1;
  int64 item_id = 2;
}

message ListRewardsRequest {}

message ListRewardsResponse {
  repeated DailyRewardItem items = 1;
}

message GetClaimStatusRequest {
  int64 account_id = 1;
}

message GetClaimStatusResponse {
  bool claimed_today = 1;
  int64 claimed_item_id = 2;
  string claimed_item_title = 3; // "" if the claimed offer was later deleted
}

message ClaimRewardRequest {
  int64 account_id = 1;
  int64 reward_item_id = 2;
}

message ClaimRewardResponse {
  ClaimResult result = 1;
}

// Donate top-up (recarga de créditos). The browser never calls these directly;
// the Next.js BFF derives account_id from the httpOnly session cookie and
// correlates payments by external_reference. The service is agnostic to the
// payment method (PIX now, credit card later) — the method is a field on the
// order, not part of the RPC name. Crediting happens inside ConfirmTopupOrder
// (same transaction that flips the order to PAID), so it is idempotent and does
// not need a moderator_id.
service DonateTopupService {
  rpc GetPayerProfile(GetPayerProfileRequest) returns (GetPayerProfileResponse);
  rpc SavePayerProfile(SavePayerProfileRequest) returns (SavePayerProfileResponse);
  rpc CreateTopupOrder(CreateTopupOrderRequest) returns (CreateTopupOrderResponse);
  rpc ConfirmTopupOrder(ConfirmTopupOrderRequest) returns (ConfirmTopupOrderResponse);
  rpc GetTopupOrder(GetTopupOrderRequest) returns (GetTopupOrderResponse);
}

// Payment method — extensible without breaking the wire contract (append new
// values at the end).
enum PaymentMethod {
  PAYMENT_METHOD_UNSPECIFIED = 0;
  PAYMENT_METHOD_PIX = 1;
  PAYMENT_METHOD_CREDIT_CARD = 2; // reserved; not used by the portal yet
}

enum TopupResult {
  TOPUP_RESULT_UNSPECIFIED = 0;
  TOPUP_RESULT_CONFIRMED = 1;         // order was PENDING -> credited now
  TOPUP_RESULT_ALREADY_CONFIRMED = 2; // order was already PAID -> no-op
  TOPUP_RESULT_NOT_FOUND = 3;         // external_reference does not exist
}

enum TopupStatus {
  TOPUP_STATUS_UNSPECIFIED = 0;
  TOPUP_STATUS_PENDING = 1;
  TOPUP_STATUS_PAID = 2;
}

message GetPayerProfileRequest {
  int64 account_id = 1;
}

message GetPayerProfileResponse {
  bool found = 1;
  string name = 2;
  string cpf = 3;
}

message SavePayerProfileRequest {
  int64 account_id = 1;
  string name = 2;
  string cpf = 3;
}

message SavePayerProfileResponse {
  AdminResult result = 1;
}

message CreateTopupOrderRequest {
  int64 account_id = 1;
  string external_reference = 2; // UUID generated by the portal (unique)
  int32 credits = 3;             // credits to grant once paid
  int64 amount_cents = 4;        // amount charged, in cents
  PaymentMethod payment_method = 5;
}

message CreateTopupOrderResponse {
  AdminResult result = 1;
  int64 order_id = 2;
}

message ConfirmTopupOrderRequest {
  string external_reference = 1;
}

message ConfirmTopupOrderResponse {
  TopupResult result = 1;
  int64 new_balance = 2; // balance after crediting (or current, if already paid)
}

message GetTopupOrderRequest {
  string external_reference = 1;
  int64 account_id = 2; // owner; filters so an order can't leak across accounts
}

message GetTopupOrderResponse {
  TopupStatus status = 1;
  int32 credits = 2;
  int64 new_balance = 3;
}
